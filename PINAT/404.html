<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הסוואה מושלמת — פינת החי שז"ר</title>
<link href="https://fonts.bunny.net/css?family=varela-round:400|heebo:400,700,900" rel="stylesheet">
<style>
  body {
    font-family: 'Varela Round', 'Heebo', sans-serif;
    background: linear-gradient(135deg, #f4f8ff, #e8f5e9);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    text-align: center;
    color: #333;
  }
  .container {
    max-width: 480px;
    padding: 2rem 1.5rem;
  }
  .emoji-wrap {
    font-size: 6rem;
    line-height: 1;
    margin-bottom: 1rem;
    animation: sway 4s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.1));
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50%       { transform: rotate(3deg); }
  }
  .code {
    font-size: .85rem;
    font-weight: 700;
    color: #aaa;
    letter-spacing: .08em;
    margin-bottom: .4rem;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    margin: 0 0 .7rem;
    color: #1a5c35;
  }
  p {
    font-size: 1.05rem;
    color: #666;
    line-height: 1.65;
    margin: 0 0 2rem;
  }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #3aaa6e, #2a9a5e);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    padding: .75rem 2rem;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(58,170,110,.35);
    transition: transform .18s;
  }
  .btn:hover { transform: translateY(-2px); }
  .leaf-row {
    margin-top: 2.5rem;
    font-size: 1.5rem;
    letter-spacing: .25rem;
    opacity: .35;
  }
</style>
</head>
<body>
<div class="container">
  <div class="emoji-wrap">🌿</div>
  <div class="code">404</div>
  <h1>הסוואה מושלמת.</h1>
  <p>העמוד שחיפשתם פשוט נעלם בתוך החדר.<br>אפילו אנחנו לא מוצאים אותו.</p>
  <a href="/index.html" class="btn">🐾 חזרה לפינת החי</a>
  <div class="leaf-row">🌿🐹🌿🦜🌿🐢🌿</div>
</div>
</body>
</html>
